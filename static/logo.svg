<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="wave" x1="8" y1="32" x2="56" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Signal waveform -->
  <polyline
    points="10,36 18,36 22,20 28,44 34,24 38,40 42,28 46,36 54,36"
    stroke="url(#wave)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
  <!-- Small data dots -->
  <circle cx="22" cy="20" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="28" cy="44" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="34" cy="24" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="42" cy="28" r="2.5" fill="white" opacity="0.9"/>
</svg>
